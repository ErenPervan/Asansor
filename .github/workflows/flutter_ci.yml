name: Flutter CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  flutter_ci:
    runs-on: ubuntu-latest
    env:
      FLUTTER_SUPPRESS_ANALYTICS: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.41.6"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check for mojibake (corrupted Turkish characters)
        run: |
          if git grep -q -P "\xc3\x83|\xc3\x84|\xc3\x85|\xc3\xa2\xe2\x82\xac" lib/; then
            echo "❌ Mojibake detected. Fix encoding before committing."
            git grep -n -P "\xc3\x83|\xc3\x84|\xc3\x85|\xc3\xa2\xe2\x82\xac" lib/
            exit 1
          fi
          echo "✅ No mojibake found."

      - name: Create dummy .env file
        run: touch .env

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Edge Function Tests (Deno)
        run: deno test --allow-all supabase/functions/send-notification/index.test.ts

  android_release_build:
    runs-on: ubuntu-latest
    needs: flutter_ci
    env:
      FLUTTER_SUPPRESS_ANALYTICS: true
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEYSTORE_PATH: android/app/upload-keystore.jks
      STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.41.6"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate Android build secrets
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "ANDROID_KEYSTORE_BASE64 is required" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "KEYSTORE_PASSWORD is required" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "KEY_PASSWORD is required" && exit 1)
          test -n "$KEY_ALIAS" || (echo "KEY_ALIAS is required" && exit 1)
          test -n "$STAGING_SUPABASE_URL" || (echo "STAGING_SUPABASE_URL is required" && exit 1)
          test -n "$STAGING_SUPABASE_ANON_KEY" || (echo "STAGING_SUPABASE_ANON_KEY is required" && exit 1)

      - name: Decode Android release keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

      - name: Build Android staging app bundle
        run: >
          flutter build appbundle
          --release
          --flavor staging
          --target lib/main.dart
          --dart-define=APP_ENV=staging
          --dart-define=SUPABASE_URL=$STAGING_SUPABASE_URL
          --dart-define=SUPABASE_ANON_KEY=$STAGING_SUPABASE_ANON_KEY

      - name: Upload Android app bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-staging-aab
          path: build/app/outputs/bundle/stagingRelease/*.aab
          if-no-files-found: error

  ios_release_build:
    runs-on: macos-latest
    needs: flutter_ci
    env:
      FLUTTER_SUPPRESS_ANALYTICS: true
      STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.41.6"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate iOS build secrets
        run: |
          test -n "$STAGING_SUPABASE_URL" || (echo "STAGING_SUPABASE_URL is required" && exit 1)
          test -n "$STAGING_SUPABASE_ANON_KEY" || (echo "STAGING_SUPABASE_ANON_KEY is required" && exit 1)

      - name: Build iOS release without codesign
        run: >
          flutter build ios
          --release
          --no-codesign
          --dart-define=APP_ENV=staging
          --dart-define=SUPABASE_URL=$STAGING_SUPABASE_URL
          --dart-define=SUPABASE_ANON_KEY=$STAGING_SUPABASE_ANON_KEY
