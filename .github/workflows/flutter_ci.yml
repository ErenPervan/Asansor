name: Flutter CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  flutter_ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.41.6"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check for mojibake (corrupted Turkish characters)
        run: |
          if git grep -q -P "\xc3\x83|\xc3\x84|\xc3\x85|\xc3\xa2\xe2\x82\xac" lib/; then
            echo "❌ Mojibake detected. Fix encoding before committing."
            git grep -n -P "\xc3\x83|\xc3\x84|\xc3\x85|\xc3\xa2\xe2\x82\xac" lib/
            exit 1
          fi
          echo "✅ No mojibake found."

      - name: Create dummy .env file
        run: touch .env

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Edge Function Tests (Deno)
        run: deno test --allow-all supabase/functions/send-notification/index.test.ts
