name: Flutter CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  flutter_ci:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check for mojibake (corrupted Turkish characters)
        run: |
          if git grep -q -P "\xc3\x83|\xc3\x84|\xc3\x85|\xc3\xa2\xe2\x82\xac" lib/; then
            echo "❌ Mojibake detected. Fix encoding before committing."
            git grep -n -P "\xc3\x83|\xc3\x84|\xc3\x85|\xc3\xa2\xe2\x82\xac" lib/
            exit 1
          fi
          echo "✅ No mojibake found."

      - name: Create dummy .env file
        run: touch .env

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  android_build:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: flutter_ci
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "storeFile=release.jks" >> android/key.properties
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" >> android/key.properties

      - name: Create dummy .env file
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Create prod env
        run: |
          echo "${{ secrets.PROD_ENV_JSON }}" > env/prod.env.json

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=env/prod.env.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  supabase_migration_check:
    name: Supabase Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://supabase.com/install.sh | bash
          echo "$HOME/.supabase/bin" >> $GITHUB_PATH
      - name: Lint migrations
        run: supabase db lint --schema public
