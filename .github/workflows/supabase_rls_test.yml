name: Supabase RLS Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  migration-and-rls-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Check forbidden secret placeholders
        run: |
          if git ls-files --error-unmatch supabase/.env.local >/dev/null 2>&1; then
            echo "supabase/.env.local must not be tracked."
            exit 1
          fi

          if git grep -n -E "local-dev-secret-key|<YOUR_ANON_KEY>" -- supabase/functions; then
            echo "Forbidden webhook fallback or placeholder found in Edge Functions."
            exit 1
          fi

          for file in supabase/migrations/*.sql; do
            case "$file" in
              *20260531000002_database_webhook_setup.sql|\
              *20260603000001_secure_webhooks_and_rls.sql|\
              *20260604000001_use_settings_table_for_webhook_secret.sql|\
              *20260610000001_remove_webhook_fallback_secrets.sql)
                continue
                ;;
            esac

            if grep -n -E "local-dev-secret-key|<YOUR_ANON_KEY>" "$file"; then
              echo "Forbidden webhook fallback or placeholder found in $file."
              exit 1
            fi
          done

          final_webhook_migration="supabase/migrations/20260610000001_remove_webhook_fallback_secrets.sql"
          if grep -n -E "COALESCE\(.*(local-dev-secret-key|<YOUR_ANON_KEY>)" "$final_webhook_migration"; then
            echo "Final webhook migration must not reintroduce fallback secrets."
            exit 1
          fi

      - name: Start Supabase local stack
        run: supabase start

      - name: Validate migrations on clean local database
        run: supabase db reset

      - name: Run DB tests (pgTAP/RLS)
        run: supabase test db
