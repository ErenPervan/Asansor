                    Bakım görevleri, arıza kayıtları ve asansör durumlarını güvenle yönetin.
                </p>

<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>

</div>
</div>

<div class="space-y-1.5">

<label class="font-label-lg text-label-lg text-on-surface" for="password">Şifre</label>

</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>

<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary active-sink" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="toggle-icon">visibility</span>
</button>
</div>
</div>

</button>

</p>

<span class="material-symbols-outlined text-[16px]">verified_user</span>

</div>

</main>
<!-- Bottom Nav Suppressed (Login Page) -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Simple subtle animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const formPanel = document.querySelector('.bg-surface-container-lowest');
            formPanel.style.opacity = '0';
            formPanel.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                formPanel.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                formPanel.style.opacity = '1';
                formPanel.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
