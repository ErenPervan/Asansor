<style>
        /* Custom Shadows as per styling guide */
        .premium-shadow {
            box-shadow: 0px 10px 30px rgba(15, 76, 129, 0.06);
        }
        .map-marker {
            transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .map-marker:hover {
            transform: translate(-50%, -50%) scale(1.1);
            z-index: 40;
        }
        .marker-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.4); opacity: 0; }
        }
        /* Hide scrollbar for bottom sheet content */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex flex-col relative light">

<div class="flex items-center">

</div>
</header>
<!-- Map Canvas Area -->
<main class="flex-1 relative w-full h-full bg-surface-container-low overflow-hidden">
<!-- Map Background Simulation -->
<img alt="City Map Background" class="absolute inset-0 w-full h-full object-cover opacity-60 grayscale-[30%] contrast-75" data-alt="A clean, minimalist vector-style map of a modern city infrastructure in a light mode aesthetic. The map features subtle roads, blocks, and geographic features rendered in soft grays, light blues, and pristine whites, matching a refined corporate UI design. The lighting is even and flat, creating a high-end, uncluttered digital canvas suitable for overlaying technical operational data." data-location="Istanbul" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPZYMo5lnxPD9Dlm4FM-rcdd32HK6TtBDKcQoeXy34Qu2eHa4IV98dRPiFdOkHnJaJC3BE__AxVk7GORuzmhkrTULpalTU6EymYZEvz4tiZ8Yi0hibSaYJIkvDFmro96TDW4NVkZyWmjSJE8TwLXs15xyVlt6Seup81zxBcU_LKYxAfXcrrWlOWArMTeuhIGJ0brlrrzAoB0IrvRSNYl6yUik_1Nwuo9UwVphGBuaz9GY-JlClQRboZhltYuxtgZxzAGZz303sfQ">
<!-- Marker: Active Fault (Red) -->
<button aria-label="Fault Marker" class="absolute top-[35%] left-[45%] map-marker group" onclick="openBottomSheet('Plaza İş Merkezi - A Blok', 'Levent Mah. Büyükdere Cad. No: 12', 'fault', 'Aktif Arıza: Kapı Sensörü')">
<div class="relative w-8 h-8 flex items-center justify-center">
<div class="absolute inset-0 bg-error rounded-full marker-pulse"></div>
<div class="relative w-6 h-6 bg-error rounded-full border-2 border-surface flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-error text-[14px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
</div>
</button>
<!-- Marker: Maintenance Today (Yellow) -->
<button aria-label="Maintenance Marker" class="absolute top-[55%] left-[60%] map-marker group" onclick="openBottomSheet('Teknopark Ofisleri', 'Sanayi Mah. Teknoloji Bulvarı No: 4', 'maintenance', 'Planlı Bakım: Bugün')">
<div class="relative w-7 h-7 flex items-center justify-center">
<div class="relative w-6 h-6 bg-tertiary rounded-full border-2 border-surface flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-tertiary text-[14px]" style="font-variation-settings: 'FILL' 1;">build</span>
</div>
</div>
</button>
<!-- Marker: Normal (Green - using inline style for strict adherence to user request while avoiding generic tailwind classes) -->
<button aria-label="Normal Marker" class="absolute top-[40%] left-[75%] map-marker group" onclick="openBottomSheet('Vadi Konutları', 'Ayazağa Mah. Cendere Cad. No: 109', 'normal', 'Sistem Normal')">
<div class="relative w-6 h-6 flex items-center justify-center">
<div class="relative w-5 h-5 rounded-full border-2 border-surface shadow-md" style="background-color: #22c55e;"></div>
</div>
</button>
<!-- Marker: Normal 2 -->
<button aria-label="Normal Marker" class="absolute top-[65%] left-[30%] map-marker group" onclick="openBottomSheet('Merkez AVM', 'Şişli Merkez Mah. Halaskargazi Cad.', 'normal', 'Sistem Normal')">
<div class="relative w-6 h-6 flex items-center justify-center">

</div>
</div>

<div class="flex-1">

<div class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-sm z-50 opacity-0 pointer-events-none transition-opacity duration-300" id="bottomSheetOverlay" onclick="closeBottomSheet()"></div>

<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2 cursor-pointer" onclick="closeBottomSheet()">
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="px-panel-padding pb-8 pt-2 overflow-y-auto no-scrollbar">
<!-- Dynamic Content Area -->
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-1" id="bsBuildingName">Bina Adı</h2>
<p class="text-body-md font-body-md text-on-surface-variant flex items-center gap-1" id="bsAddress">
<span class="material-symbols-outlined text-[16px]">location_on</span>

</p>

<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-6 py-1 hover:text-primary dark:hover:text-primary-fixed transition-colors">

</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-6 py-1 hover:text-primary dark:hover:text-primary-fixed transition-colors">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="support_agent">support_agent</span>
<span class="text-label-sm font-label-sm">Destek</span>
</button>
</nav>
<!-- Interactive Scripts -->
<script>
        const bottomSheet = document.getElementById('bottomSheet');
        const overlay = document.getElementById('bottomSheetOverlay');
        
        // DOM Elements for dynamic update
        const elName = document.getElementById('bsBuildingName');
        const elAddress = document.getElementById('bsAddressText');
        const elStatusChip = document.getElementById('bsStatusChip');
        const elStatusDot = document.getElementById('bsStatusDot');
        const elStatusText = document.getElementById('bsStatusText');

        function openBottomSheet(name, address, type, statusMsg) {
            // Update Content
            elName.textContent = name;
            elAddress.textContent = address;
            elStatusText.textContent = statusMsg;

            // Reset Classes
            elStatusChip.className = 'px-4 py-1.5 rounded-full flex items-center gap-2 border';
            elStatusDot.className = 'w-2 h-2 rounded-full';
            elStatusDot.style.backgroundColor = '';

            // Apply specific styles based on type
            if(type === 'fault') {
                elStatusChip.classList.add('bg-error-container', 'border-error/20', 'text-on-error-container');
                elStatusDot.classList.add('bg-error', 'animate-pulse');
            } else if (type === 'maintenance') {
                elStatusChip.classList.add('bg-tertiary-container/30', 'border-tertiary/20', 'text-tertiary');
                elStatusDot.classList.add('bg-tertiary');
            } else if (type === 'normal') {
                elStatusChip.classList.add('bg-surface-container-high', 'border-outline-variant/30', 'text-on-surface');
                elStatusDot.style.backgroundColor = '#22c55e'; // Inline green
            }

            // Animate In
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100', 'pointer-events-auto');
            bottomSheet.classList.remove('translate-y-full');
            bottomSheet.classList.add('translate-y-0');
        }

        function closeBottomSheet() {
            // Animate Out
            overlay.classList.remove('opacity-100', 'pointer-events-auto');
            overlay.classList.add('opacity-0', 'pointer-events-none');
            bottomSheet.classList.remove('translate-y-0');
            bottomSheet.classList.add('translate-y-full');
        }
    </script>
