<style>
        /* Custom Animations & Shapes for Scanner */
        @keyframes scanLine {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(240px); opacity: 0; } /* Matches scanner frame height approx */
        }
        
        .animate-scan-line {
            animation: scanLine 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .scanner-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #0f4c81; /* primary-container */
            border-style: solid;
            transition: all 0.3s ease;
        }

        .corner-tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 16px; }
        .corner-tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 16px; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 16px; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 16px; }

        /* Pulse effect for corners to feel active */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(15, 76, 129, 0); }
            50% { box-shadow: 0 0 15px 2px rgba(15, 76, 129, 0.4) inset; }
        }
        .pulse-active {
            animation: pulse-glow 3s infinite;
        }
    </style>
</head>
<body class="bg-on-background m-0 p-0 overflow-hidden font-sans select-none antialiased text-on-surface">
<!-- Main Container: Full Screen Camera View -->
<main class="relative w-screen h-screen overflow-hidden flex flex-col">
<!-- Camera Background Image Simulation -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center z-0" data-alt="A first-person view through a smartphone camera pointing at a modern, brushed metal elevator control panel. The lighting is slightly dim, emphasizing the metallic textures and industrial setting. The overall mood is technical, precise, and professional, aligning with a premium maintenance software interface. The color palette is dominated by cool greys, subtle navy shadows, and a clean, high-tech aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAg3wiZvax2a24eNi7mLCosFG_5AU1R3JMTrViS4NLf-Bc3vlNGocEQ0APxJKsXDg6njtzkJqJ4HJrMjfrkARtrC6bstp4Uk8fXLwIlPIi3kjPe0F2f7BKhxNH7d00XKeQ-M9D_1OLpNuJ3_GogQX5pvUKkyi34BsBRGG9AaLySv2Z8mBkcVHwAEVNNFQfjc6NXcvvBetu_Tv4Yb59zgSyzlpYgCTx_wyk859jW0M4PRoFHmHxTGXah811-C9bOUQkOtG55Fi22eA');">
</div>
<!-- Overlay & Cutout Area -->
<!-- Using a massive box shadow to create the darkened area outside the clear scanning box -->
<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
<div class="relative w-[260px] h-[260px] rounded-[18px] shadow-[0_0_0_9999px_rgba(24,28,30,0.85)] pulse-active bg-transparent">
<!-- Viewfinder Corners -->
<div class="scanner-corner corner-tl"></div>
<div class="scanner-corner corner-tr"></div>
<div class="scanner-corner corner-bl"></div>
<div class="scanner-corner corner-br"></div>
<!-- Animated Scan Line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary-container shadow-[0_0_8px_rgba(15,76,129,0.8)] animate-scan-line z-20"></div>
<!-- Subtle targeting reticle inside -->
<div class="absolute inset-0 flex items-center justify-center opacity-30">
<span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'wght' 200;">add</span>
</div>
</div>
</div>
<!-- Top Controls (Floating Header) -->
<header class="relative z-50 w-full px-container-padding pt-12 pb-4 flex justify-between items-center">
<!-- Back Button -->
<button aria-label="Geri" class="w-12 h-12 rounded-full bg-surface/20 backdrop-blur-xl border border-surface/30 flex items-center justify-center text-on-primary shadow-lg active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<!-- Flashlight Toggle -->
<button aria-label="Fener" class="w-12 h-12 rounded-full bg-surface/20 backdrop-blur-xl border border-surface/30 flex items-center justify-center text-on-primary shadow-lg active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[24px]">flashlight_off</span>
</button>
</header>
<!-- Spacer to push bottom controls down -->
<div class="flex-grow"></div>
<!-- Bottom Controls & Instructions -->
<div class="relative z-50 w-full px-container-padding pb-12 flex flex-col items-center gap-stack-gap-lg bg-gradient-to-t from-on-background/90 to-transparent pt-16">
<!-- Instruction Text -->
<div class="text-center max-w-[280px]">
<h2 class="font-headline-sm text-headline-sm text-on-primary mb-2">QR Kodu Taratın</h2>
<p class="font-body-md text-body-md text-outline-variant">
                    Asansör etiketindeki veya paneldeki karekodu çerçevenin içine hizalayın.
                </p>
</div>
<!-- Gallery Action Button -->
<button class="mt-4 flex items-center gap-2 px-6 py-3.5 rounded-full bg-surface/10 backdrop-blur-xl border border-surface/20 text-on-primary shadow-[0px_10px_30px_rgba(0,0,0,0.2)] hover:bg-surface/20 active:scale-95 transition-all duration-300 group">
<span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform">photo_library</span>
<span class="font-label-lg text-label-lg">Galeriden Seç</span>
</button>
</div>
</main>
<script>
        // Simple script to toggle flashlight icon visually for the prototype
        document.addEventListener('DOMContentLoaded', () => {
            const flashlightBtn = document.querySelector('button[aria-label="Fener"]');
            const icon = flashlightBtn.querySelector('.material-symbols-outlined');
            
            flashlightBtn.addEventListener('click', () => {
                if (icon.textContent === 'flashlight_off') {
                    icon.textContent = 'flashlight_on';
                    icon.classList.add('text-tertiary-fixed'); // Add a yellowish tint when on
                } else {
                    icon.textContent = 'flashlight_off';
                    icon.classList.remove('text-tertiary-fixed');
                }
            });
        });
    </script>
</body></html>
