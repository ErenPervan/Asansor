<!DOCTYPE html><html class="light" lang="tr"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Bilgileriniz hazırlanıyor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e0e3e6",
                        "background": "#f7fafd",
                        "tertiary-fixed": "#ffe08e",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "outline-variant": "#c2c7d1",
                        "inverse-surface": "#2d3133",
                        "on-primary-fixed-variant": "#07497d",
                        "on-secondary-container": "#43627f",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#2a4965",
                        "secondary-container": "#beddff",
                        "on-error": "#ffffff",
                        "surface-tint": "#2d6197",
                        "on-tertiary-fixed": "#241a00",
                        "tertiary-fixed-dim": "#ecc246",
                        "surface-container-high": "#e5e8eb",
                        "surface-container-highest": "#e0e3e6",
                        "on-background": "#181c1e",
                        "inverse-primary": "#a0c9ff",
                        "surface-bright": "#f7fafd",
                        "secondary": "#43617e",
                        "primary-fixed": "#d2e4ff",
                        "surface": "#f7fafd",
                        "primary": "#00355f",
                        "tertiary-container": "#cea62c",
                        "secondary-fixed-dim": "#aacaeb",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001c37",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#181c1e",
                        "surface-dim": "#d7dadd",
                        "outline": "#727780",
                        "tertiary": "#755b00",
                        "surface-container": "#ebeef1",
                        "on-surface-variant": "#42474f",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eef1f4",
                        "on-tertiary-container": "#4f3d00",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f1f4f7",
                        "on-primary-container": "#8ebdf9",
                        "secondary-fixed": "#cee5ff",
                        "primary-container": "#0f4c81",
                        "on-tertiary-fixed-variant": "#584400",
                        "primary-fixed-dim": "#a0c9ff",
                        "on-secondary-fixed": "#001d33"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gutter": "16px",
                        "stack-gap-lg": "24px",
                        "stack-gap-md": "16px",
                        "panel-padding": "24px",
                        "stack-gap-sm": "8px",
                        "container-padding": "20px"
                    },
                    "fontFamily": {
                        "label-lg": ["Nunito Sans"],
                        "headline-lg": ["Nunito Sans"],
                        "display-lg": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"],
                        "headline-lg-mobile": ["Nunito Sans"],
                        "headline-sm": ["Nunito Sans"],
                        "label-sm": ["Nunito Sans"],
                        "headline-md": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "700" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "800" }],
                        "display-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "800" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "800" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .loader {
            border-top-color: #0F4C81;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-in forwards;
            opacity: 0;
        }
        
        .fade-in-delayed {
            animation: fadeIn 0.8s ease-in 0.4s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-sans antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md px-container-padding flex flex-col items-center">
<!-- Loading State Container -->
<div class="flex flex-col items-center text-center fade-in w-full" id="loading-state">
<!-- Premium Loading Ring -->
<div class="relative w-24 h-24 mb-stack-gap-lg">
<!-- Outer subtle track -->
<div class="absolute inset-0 rounded-full border-4 border-surface-container-highest"></div>
<!-- Animated primary indicator -->
<div class="absolute inset-0 rounded-full border-4 border-transparent loader"></div>
<!-- Center Icon -->
<div class="absolute inset-0 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                        admin_panel_settings
                    </span>
</div>
</div>
<!-- Text Content -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-stack-gap-sm tracking-tight">
                Bilgileriniz hazırlanıyor
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px]">
                Profil ve yetki bilgileri kontrol ediliyor.
            </p>
<!-- Subtle Progress Bar (Optional, for visual texture) -->
<div class="w-48 h-1 bg-surface-container-highest rounded-full mt-stack-gap-lg overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary-container w-1/3 rounded-full animate-pulse"></div>
</div>
</div>
<!-- Error State Container (Hidden by default, used for demonstration) -->
<div class="hidden flex-col items-center text-center fade-in-delayed w-full mt-stack-gap-lg" id="error-state">
<!-- Error Card -->
<div class="bg-surface-container-lowest rounded-[22px] p-panel-padding shadow-[0px_10px_30px_rgba(15,76,129,0.06)] border border-surface-variant w-full relative overflow-hidden group">
<!-- Top Accent Line -->
<div class="absolute top-0 left-0 right-0 h-1 bg-error"></div>
<div class="flex flex-col items-center">
<div class="w-12 h-12 rounded-full bg-error-container text-error flex items-center justify-center mb-stack-gap-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">
                            error
                        </span>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-stack-gap-sm">
                        Bağlantı Hatası
                    </h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-gap-lg">
                        Sunucu ile iletişim kurulamadı. Lütfen tekrar deneyin veya çıkış yapın.
                    </p>
<button class="w-full bg-transparent text-primary-container font-label-lg text-label-lg py-3 px-6 rounded-2xl hover:bg-surface-variant transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">
                            logout
                        </span>
                        Çıkış Yap
                    </button>
</div>
</div>
</div>
</main>
<script>
        // Simulate a loading process and then show error for demonstration purposes
        // In a real app, this would be tied to actual data fetching logic.
        setTimeout(() => {
            const loadingState = document.getElementById('loading-state');
            const errorState = document.getElementById('error-state');
            
            // Add a subtle fade out to the loading text to indicate a change
            loadingState.querySelector('p').classList.add('opacity-50');
            loadingState.querySelector('.loader').classList.add('border-error');
            loadingState.querySelector('.loader').classList.remove('border-top-color');
            
            // Show error state
            errorState.classList.remove('hidden');
            errorState.classList.add('flex');
            
        }, 5000); // Wait 5 seconds before showing error
    </script>
</body></html>
